name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (e.g. 0.2.1). Leave empty to only build artifacts without publishing a release."
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            formats: dmg
          - label: windows-x86_64
            os: windows-latest
            formats: nsis
          - label: linux-x86_64
            os: ubuntu-22.04
            formats: appimage,deb
          - label: linux-arm64
            os: ubuntu-22.04-arm
            formats: appimage,deb
    steps:
      - uses: actions/checkout@v5

      - name: Stamp release version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PY=python3
            command -v "$PY" >/dev/null 2>&1 || PY=python
            "$PY" scripts/stamp_version.py "$VERSION"
          else
            echo "No semver release version (got '$VERSION'); leaving Cargo.toml version as-is"
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libfontconfig-dev libwayland-dev \
            libxkbcommon-x11-dev libssl-dev libzstd-dev libgit2-dev \
            libfuse2 build-essential cmake clang

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.label }}
          cache-on-failure: true

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Build release binary
        run: cargo build --release -p pawse

      - name: Enable macOS code signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            python3 scripts/enable_macos_signing.py "Pawse Self Signed"
          else
            echo "APPLE_CERTIFICATE secret not set; building unsigned"
          fi

      - name: Package
        working-directory: crates/pawse
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: cargo packager --release --formats ${{ matrix.formats }} --verbose

      - name: Re-image dmg without signature
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then exit 0; fi
          shopt -s nullglob
          for dmg in target/release/*.dmg; do
            tmp="${dmg%.dmg}.repacked.dmg"
            hdiutil convert "$dmg" -format UDZO -o "$tmp"
            mv -f "$tmp" "$dmg"
            echo "re-imaged unsigned: $dmg"
          done

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          for f in \
            target/release/*.dmg \
            target/release/*.AppImage \
            target/release/*.deb \
            target/release/*-setup.exe \
            target/release/nsis/*-setup.exe; do
            cp "$f" dist/
          done
          ls -la dist

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            These builds are not code-signed.

            **macOS** — move `Pawse.app` to Applications, then clear the quarantine flag once:
            ```
            xattr -dr com.apple.quarantine /Applications/Pawse.app
            ```
            This is required: the app is unsigned, so macOS reports it as "damaged" and the right-click → Open trick does not work on Apple Silicon.

            **Windows** — in the SmartScreen dialog, click "More info" → "Run anyway".

            **Linux** — make the `.AppImage` executable (`chmod +x`) and run it, or install the `.deb`.
